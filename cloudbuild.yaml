steps:
  # Build image
  - name: "gcr.io/cloud-builders/docker"
    secretEnv:
      - NEXT_PUBLIC_GOOGLE_API_KEY
      - NEXT_PUBLIC_FIREBASE_API_KEY
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID
      - NEXT_PUBLIC_FIREBASE_APP_ID
      - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
      - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${_TAG}",

        "--build-arg",
        "NEXT_PUBLIC_GOOGLE_API_KEY",

        "--build-arg",
        "NEXT_PUBLIC_FIREBASE_API_KEY",

        "--build-arg",
        "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN",

        "--build-arg",
        "NEXT_PUBLIC_FIREBASE_PROJECT_ID",

        "--build-arg",
        "NEXT_PUBLIC_FIREBASE_APP_ID",

        "--build-arg",
        "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET",

        "--build-arg",
        "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID",


        "."
      ]

  # Push image
  - name: "gcr.io/cloud-builders/docker"
    args:
      ["push", "gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${_TAG}"]

  # Deploy to Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      [
        "run",
        "services",
        "update",
        "${_SERVICE_NAME}",
        "--region",
        "${_REGION}",
        # If these were previously set as plain env vars, remove them so we can
        # re-add them as Secret Manager-backed env vars.
        "--remove-env-vars",
        "API_BASE_URL,NEXT_PUBLIC_REVALIDATE_SECRET",
        "--quiet"
      ]

  # Deploy to Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      [
        "run",
        "deploy",
        "${_SERVICE_NAME}",
        "--image",
        "gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${_TAG}",
        "--region",
        "${_REGION}",
        "--platform",
        "managed",
        "--allow-unauthenticated",
        "--memory",
        "512Mi",
        "--cpu",
        "1",
        "--timeout",
        "300",
        "--max-instances",
        "10",

        # Set runtime secrets as env vars (server-side only).
        "--set-secrets",
        "API_BASE_URL=API_BASE_URL:latest,NEXT_PUBLIC_REVALIDATE_SECRET=NEXT_PUBLIC_REVALIDATE_SECRET:latest"
      ]

images:
  - "gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${_TAG}"

substitutions:
  _SERVICE_NAME: "nextjs-web"
  _REGION: "asia-south1"
  _TAG: "latest"

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_GOOGLE_API_KEY/versions/latest
      env: NEXT_PUBLIC_GOOGLE_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_API_KEY/versions/latest
      env: NEXT_PUBLIC_FIREBASE_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN/versions/latest
      env: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_PROJECT_ID/versions/latest
      env: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_APP_ID/versions/latest
      env: NEXT_PUBLIC_FIREBASE_APP_ID
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET/versions/latest
      env: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID/versions/latest
      env: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: N1_HIGHCPU_8

timeout: 1200s